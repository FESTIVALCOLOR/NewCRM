name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Проверка синтаксиса Python
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Проверка синтаксиса серверных файлов
        run: |
          python -m py_compile server/main.py
          python -m py_compile server/database.py
          python -m py_compile server/schemas.py
          python -m py_compile server/auth.py
          python -m py_compile server/config.py

  # Lint серверного кода
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install flake8
      - name: Lint сервера
        run: |
          flake8 server/ \
            --max-line-length=200 \
            --exclude=server/alembic \
            --ignore=E501,W503,E402,E722,F841,W504,E122,E124,E127,E128,E226,E231,E301,E302,E303,E711,E712,W291,W391,F401,F541,F811

  # Тесты БД (без сервера, temp SQLite)
  test-db:
    runs-on: ubuntu-latest
    needs: [syntax-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Установка зависимостей
        run: |
          pip install pytest pytest-timeout pytest-order requests urllib3 pydantic pydantic-settings
      - name: Запуск DB тестов
        run: pytest tests/db/ -v --timeout=60 -p no:qt

  # Сборка Docker образа
  docker-build:
    runs-on: ubuntu-latest
    needs: [syntax-check]
    steps:
      - uses: actions/checkout@v4
      - name: Сборка Docker образа API
        run: docker build -t crm-api ./server

  # E2E тесты (с реальным PostgreSQL)
  test-e2e:
    runs-on: ubuntu-latest
    needs: [docker-build]
    env:
      DATABASE_URL: postgresql://crm_user:test_password@localhost:5432/interior_studio_crm
      SECRET_KEY: test-secret-key-for-ci
      API_BASE_URL: http://localhost:8000
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: crm_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: interior_studio_crm
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U crm_user"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Установка зависимостей сервера
        run: pip install -r server/requirements.txt
      - name: Установка зависимостей тестов
        run: pip install pytest pytest-timeout pytest-order requests urllib3
      - name: Запуск API сервера
        run: |
          cd server
          nohup uvicorn main:app --host 0.0.0.0 --port 8000 > /tmp/server.log 2>&1 &
          echo "Ожидание запуска сервера..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Сервер запущен (попытка $i)"
              break
            fi
            sleep 2
          done
          curl -f http://localhost:8000/health || (echo "=== Лог сервера ===" && cat /tmp/server.log && exit 1)
      - name: Запуск E2E тестов
        run: pytest tests/e2e/ -v --timeout=60 -x -p no:qt
      - name: Показать лог сервера при ошибке
        if: failure()
        run: cat /tmp/server.log 2>/dev/null || true
