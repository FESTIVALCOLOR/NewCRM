[pytest]
# Interior Studio CRM - Pytest Configuration
# TDD Testing with warn mode (tests warn but don't block)

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for categorizing tests
markers =
    backend: Backend tests (FastAPI, SQLAlchemy, Pydantic)
    frontend: Frontend tests (PyQt5 widgets and dialogs)
    api_client: API Client tests (APIClient, OfflineManager)
    integration: Integration tests (end-to-end flows)
    edge_cases: Edge cases tests (duplicates, offline, integrity)
    slow: Slow tests (skip with -m "not slow")
    critical: Critical tests that must pass
    e2e: End-to-end tests against real API server
    db: Database tests with temporary SQLite
    order: Test execution order (pytest-order)
    ui: Qt widget tests (pytest-qt offscreen)
    fuzz: API fuzzing tests (Schemathesis)
    ui_real: Real UI tests with DataAccess (pytest-qt + real API)
    property: Property-based tests (Hypothesis)
    visual: Visual regression tests (QWidget.grab)
    smoke: Smoke tests against real server (data validation)
    data_consistency: Data consistency tests (real server, value validation)
    pywinauto: Windows UIA integration tests (pywinauto)

# Output settings
addopts =
    -v
    --tb=short
    --strict-markers
    -ra
    --color=yes

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout for tests (seconds)
timeout = 60

# Coverage: раскомментируйте для отчёта покрытия
# addopts = --cov=server --cov=ui --cov=utils --cov=database --cov-report=term-missing --cov-report=html

# Async mode for FastAPI tests
asyncio_mode = auto
